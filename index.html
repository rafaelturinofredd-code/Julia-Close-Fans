<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcanjo • Espaço Exclusivo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <div class="login-box">
        <h1>Bem-vindo ao Arcanjo</h1>
        <p class="subtitle">Acesse seu espaço exclusivo</p>
        
        <input type="email" id="loginEmail" placeholder="Seu email" required>
        <input type="password" id="loginPass" placeholder="Sua senha" required>
        
        <button onclick="login()">Entrar</button>
        <button onclick="register()" style="background:#333; margin-top:8px;">Criar Nova Conta</button>
        
        <button onclick="loginWithGoogle()" style="background:#4285f4; margin-top:15px; color:white;">
          <i class="fab fa-google"></i> Entrar com Google
        </button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen hidden">
    <header class="header">
      <div class="nav">
        <h2>Arcanjo</h2>
        <div class="nav-links">
          <a href="#" onclick="showSection('home')" class="active"><i class="fas fa-home"></i> Início</a>
          <a href="#" onclick="showSection('packs')"><i class="fas fa-gem"></i> Packs</a>
          <a href="#" onclick="showSection('content')"><i class="fas fa-folder"></i> Conteúdos</a>
        </div>
        <div class="user-header" onclick="toggleProfileMenu()">
          <img id="headerPic" src="https://i.pravatar.cc/150" alt="">
          <span id="headerName">Arcanjo</span>
        </div>
      </div>
    </header>

    <div class="cover" id="coverPhoto">
      <button class="edit-cover-btn" onclick="editCover()"><i class="fas fa-camera"></i></button>
    </div>

    <div class="profile-section">
      <div class="profile-pic-container">
        <img id="profilePic" src="https://i.pravatar.cc/300?u=arcanjo" alt="Perfil">
        <button class="edit-pic-btn" onclick="editProfilePic()"><i class="fas fa-camera"></i></button>
      </div>
      <h1 id="userName">Arcanjo</h1>
      <p id="userBio" class="bio">Criador | Visionário | Conteúdo exclusivo.</p>
      <button class="edit-bio-btn" onclick="editBio()">Editar Biografia</button>
    </div>

    <div class="main-content">
      <div id="homeSection" class="section">
        <h2>Bem-vindo ao seu espaço exclusivo</h2>
      </div>

      <div id="packsSection" class="section hidden">
        <h2>Pacotes de Assinatura</h2>
        <div id="packsContainer" class="packs-grid"></div>
        <button class="add-pack-btn" onclick="showCreatePackModal()">
          <i class="fas fa-plus"></i> Criar Novo Pack
        </button>
      </div>

      <div id="contentSection" class="section hidden">
        <h2>Conteúdos Liberados</h2>
        <p class="coming-soon">Seus conteúdos aparecerão aqui após a assinatura.</p>
      </div>
    </div>
  </div>

  <!-- Modal Novo Pack -->
  <div id="packModal" class="modal hidden">
    <div class="modal-content">
      <h2>Novo Pack</h2>
      <input type="text" id="packTitle" placeholder="Nome do Pack">
      <textarea id="packDesc" placeholder="Descrição do pack"></textarea>
      <input type="number" id="packPrice" placeholder="Valor mensal (R$)">
      <button onclick="createPack()">Criar Pack</button>
      <button onclick="closeModal()" class="cancel">Cancelar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
